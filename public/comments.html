<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comentarios</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <script>
    if (!localStorage.getItem("token") || !localStorage.getItem("userId")) {
      window.location.href = "login.html";
    }
  </script>

  <div class="page-shell fade-in">
    <header class="topbar">
      <div class="brand">
        <h1 class="brand-title">UniEmpleos</h1>
      </div>

      <div class="menu-shell" id="menuShell" onmouseenter="openMobileNav()" onmouseleave="closeMobileNav()">
        <button class="button-secondary nav-toggle" type="button" onclick="toggleMobileNav()">Menu</button>

        <nav class="nav-links">
          <span class="user-chip" id="userChip"></span>
          <a class="nav-link" href="index.html" onclick="closeMobileNav()"><span class="nav-link-row">Inicio</span></a>
          <a class="nav-link" href="messages.html" onclick="closeMobileNav()"><span class="nav-link-row">Mensajes <span class="nav-badge" id="messagesBadge"></span></span></a>
          <a class="nav-link" href="profile.html" onclick="closeMobileNav()"><span class="nav-link-row">Perfil</span></a>
          <button class="button-secondary" type="button" onclick="logout()">Cerrar sesion</button>
        </nav>
      </div>
    </header>

    <main class="layout-grid">
      <section class="panel-stack">
        <article class="card post-card" id="postCard">
          <div class="post-copy">
            <h2 class="section-subtitle">Cargando publicacion...</h2>
          </div>
        </article>

        <section class="container">
          <div class="counter-row">
            <h2 class="section-title">Comentarios</h2>
            <a class="button-secondary" id="messageAuthorLink" href="messages.html">Mensaje al autor</a>
          </div>

          <div class="comment-list" id="comments"></div>

          <div class="comment-input" style="margin-top:18px;">
            <input id="commentInput" maxlength="300" placeholder="Agrega una respuesta o una duda">
            <button type="button" onclick="addComment()">Enviar</button>
          </div>
        </section>
      </section>

      <aside class="panel sidebar-card">
        <h2 class="section-subtitle">Tip</h2>
        <div class="empty-state">
          Si la conversacion ya paso a detalles privados, usa el boton de mensaje directo para seguir como en LinkedIn.
        </div>
      </aside>
    </main>
  </div>

  <div class="modal" id="imageModal" onclick="closeImageModal(event)">
    <div class="modal-content">
      <button class="button-secondary modal-close" type="button" onclick="closeImageModal()">Cerrar</button>
      <img class="modal-image" id="modalImage" alt="Vista completa">
    </div>
  </div>

  <script>
    const API_BASE =
      window.location.protocol === "file:"
        ? "https://foro-trabajos.onrender.com"
        : window.location.origin;
    const token = localStorage.getItem("token");
    const currentUserId = localStorage.getItem("userId");
    const postId = new URLSearchParams(window.location.search).get("postId");

    const postCard = document.getElementById("postCard");
    const commentsContainer = document.getElementById("comments");
    const userChip = document.getElementById("userChip");
    const messageAuthorLink = document.getElementById("messageAuthorLink");
    const menuShell = document.getElementById("menuShell");
    const messagesBadge = document.getElementById("messagesBadge");
    const imageModal = document.getElementById("imageModal");
    const modalImage = document.getElementById("modalImage");
    const commentInput = document.getElementById("commentInput");
    let commentsInterval = null;
    let commentDraft = "";

    userChip.textContent = localStorage.getItem("username") || "Usuario";

    function toggleMobileNav() {
      menuShell.classList.toggle("mobile-open");
    }

    function openMobileNav() {
      menuShell.classList.add("mobile-open");
    }

    function closeMobileNav() {
      menuShell.classList.remove("mobile-open");
    }

    function openImageModal(src, title) {
      modalImage.src = decodeURIComponent(src);
      modalImage.alt = decodeURIComponent(title || "Vista completa");
      imageModal.classList.add("active");
    }

    function closeImageModal(event) {
      if (event && event.target && event.target !== imageModal) {
        return;
      }

      imageModal.classList.remove("active");
      modalImage.src = "";
    }

    function rememberDraft() {
      commentDraft = commentInput.value;
    }

    function logout() {
      localStorage.clear();
      window.location.href = "login.html";
    }

    function authHeaders(extra = {}) {
      return {
        ...extra,
        Authorization: `Bearer ${token}`,
      };
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    async function refreshMessagesBadge() {
      try {
        const response = await fetch(`${API_BASE}/messages`, {
          headers: authHeaders(),
        });

        if (!response.ok) {
          return;
        }

        const conversations = await response.json();
        const lastSeenAt = localStorage.getItem("messagesLastSeenAt");
        const lastSeenTime = lastSeenAt ? new Date(lastSeenAt).getTime() : 0;
        const unseenCount = conversations.filter((conversation) => {
          const latest = conversation.latestMessage;
          return (
            latest &&
            latest.from !== currentUserId &&
            latest.createdAt &&
            new Date(latest.createdAt).getTime() > lastSeenTime
          );
        }).length;

        messagesBadge.textContent = unseenCount > 0 ? String(unseenCount) : "";
      } catch (error) {
        messagesBadge.textContent = "";
      }
    }

    function formatDate(dateString) {
      return new Date(dateString).toLocaleString("es-MX", {
        dateStyle: "medium",
        timeStyle: "short",
      });
    }

    function formatTime(dateString) {
      return new Date(dateString).toLocaleTimeString("es-MX", {
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    function renderAvatar(user) {
      if (user?.avatar) {
        return `<img class="avatar" src="${user.avatar}" alt="Avatar de ${escapeHtml(user.username)}">`;
      }

      const initials = String(user?.username || "U")
        .split(" ")
        .filter(Boolean)
        .slice(0, 2)
        .map((part) => part[0].toUpperCase())
        .join("");

      return `<div class="avatar-placeholder avatar">${escapeHtml(initials)}</div>`;
    }

    async function loadPost() {
      try {
        const response = await fetch(`${API_BASE}/posts`, {
          headers: authHeaders(),
        });

        if (!response.ok) {
          throw new Error("No se pudo cargar la publicacion");
        }

        const posts = await response.json();
        const post = posts.find((item) => item._id === postId);

        if (!post) {
          postCard.innerHTML = '<div class="post-copy"><p class="empty-state">La publicacion no existe o fue eliminada.</p></div>';
          return;
        }

        const authorId = post.author?._id || post.userId;
        messageAuthorLink.href =
          String(authorId) === String(currentUserId)
            ? "messages.html"
            : `messages.html?userId=${encodeURIComponent(authorId)}&postId=${encodeURIComponent(post._id)}`;

        postCard.innerHTML = `
          <div class="post-head">
            <div class="author-meta">
              ${renderAvatar(post.author)}
              <div>
                <h3>${escapeHtml(post.author?.username || "Usuario")}</h3>
                <p class="timestamp">${escapeHtml(formatDate(post.createdAt))}</p>
              </div>
            </div>
          </div>

          ${
            post.media
              ? `<img class="post-image" src="${post.media}" alt="Imagen de ${escapeHtml(
                  post.title
                )}" onclick="openImageModal('${encodeURIComponent(post.media)}', '${encodeURIComponent(post.title)}')">`
              : ""
          }

          <div class="post-copy">
            <h3>${escapeHtml(post.title)}</h3>
            <p>${escapeHtml(post.description)}</p>
          </div>
        `;
      } catch (error) {
        postCard.innerHTML = `<div class="post-copy"><p class="empty-state">${escapeHtml(error.message)}</p></div>`;
      }
    }

    async function loadComments() {
      const activeElementId = document.activeElement?.id;
      const previousScrollTop = commentsContainer.scrollTop;
      const hasExistingComments =
        commentsContainer.children.length > 0 && !commentsContainer.querySelector(".empty-state");

      if (!hasExistingComments) {
        commentsContainer.innerHTML = '<div class="empty-state">Cargando comentarios...</div>';
      } else {
        commentsContainer.classList.add("updating");
      }

      try {
        const response = await fetch(`${API_BASE}/comments/${postId}`, {
          headers: authHeaders(),
        });

        if (!response.ok) {
          throw new Error("No se pudieron cargar los comentarios");
        }

        const comments = await response.json();

        if (!comments.length) {
          commentsContainer.innerHTML = '<div class="empty-state">Todavia no hay comentarios en esta publicacion.</div>';
          commentsContainer.classList.remove("updating");
          return;
        }

        commentsContainer.innerHTML = comments
          .map(
            (comment) => `
              <article class="comment">
                <strong>${escapeHtml(comment.username)}</strong>
                <span>${escapeHtml(comment.content)}</span>
                <span class="comment-time">${escapeHtml(formatTime(comment.createdAt))}</span>
              </article>
            `
          )
          .join("");
        commentsContainer.scrollTop = previousScrollTop;
        commentsContainer.classList.remove("updating");

        if (commentDraft) {
          commentInput.value = commentDraft;
        }

        if (activeElementId === "commentInput") {
          commentInput.focus();
          commentInput.setSelectionRange(commentInput.value.length, commentInput.value.length);
        }
      } catch (error) {
        commentsContainer.innerHTML = `<div class="empty-state">${escapeHtml(error.message)}</div>`;
        commentsContainer.classList.remove("updating");
      }
    }

    async function addComment() {
      const input = document.getElementById("commentInput");
      const content = input.value.trim();

      if (!content) {
        input.focus();
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/comment`, {
          method: "POST",
          headers: authHeaders({
            "Content-Type": "application/json",
          }),
          body: JSON.stringify({ postId, content }),
        });

        if (!response.ok) {
          throw new Error(await response.text());
        }

        input.value = "";
        commentDraft = "";
        await loadComments();
      } catch (error) {
        alert(error.message || "No se pudo enviar el comentario");
      }
    }

    commentInput.addEventListener("input", rememberDraft);
    commentInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        addComment();
      }
    });
    loadPost();
    loadComments();
    refreshMessagesBadge();
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeImageModal();
        closeMobileNav();
      }
    });
    document.addEventListener("click", (event) => {
      if (!menuShell.contains(event.target)) {
        closeMobileNav();
      }
    });
    commentsInterval = window.setInterval(() => {
      loadPost();
      loadComments();
      refreshMessagesBadge();
    }, 10000);
  </script>
</body>
</html>
