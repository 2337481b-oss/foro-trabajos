<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear cuenta</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <script>
    if (localStorage.getItem("token") && localStorage.getItem("userId")) {
      window.location.href = "index.html";
    }
  </script>

  <main class="page-shell fade-in">
    <section class="card form-card">
      <div class="brand">
        <div class="brand-mark">FT</div>
        <div class="brand-copy">
          <h2>Crea tu cuenta</h2>
          <p>Publica mejor, comenta con tu perfil real y recibe mensajes directos.</p>
        </div>
      </div>

      <div class="form-grid">
        <div class="field-group">
          <label class="field-label" for="username">Usuario</label>
          <input id="username" maxlength="30" placeholder="Tu nombre o alias profesional">
        </div>

        <div class="field-group">
          <label class="field-label" for="email">Email</label>
          <input id="email" type="email" autocomplete="email" placeholder="tucorreo@ejemplo.com">
        </div>

        <div class="field-group">
          <label class="field-label" for="password">Contrasena</label>
          <input id="password" type="password" autocomplete="new-password" placeholder="Minimo 6 caracteres, 1 mayuscula y 1 numero">
        </div>

        <div class="field-group">
          <label class="field-label" for="confirmPassword">Confirmar contrasena</label>
          <input id="confirmPassword" type="password" autocomplete="new-password" placeholder="Repite tu contrasena">
        </div>

        <button class="button-block" id="registerBtn" type="button" onclick="register()">Crear cuenta</button>
        <p class="status-message" id="status" aria-live="polite"></p>

        <p class="helper-text">
          Ya tienes cuenta?
          <a class="toggle-link" href="login.html">Inicia sesion</a>
        </p>
      </div>
    </section>
  </main>

  <script>
    const API_BASE =
      window.location.protocol === "file:"
        ? "https://foro-trabajos.onrender.com"
        : window.location.origin;
    const registerBtn = document.getElementById("registerBtn");
    const status = document.getElementById("status");

    function showStatus(message, variant) {
      status.textContent = message;
      status.className = `status-message ${variant}`;
    }

    async function register() {
      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const confirmPassword = document.getElementById("confirmPassword").value.trim();

      if (!username || !email || !password || !confirmPassword) {
        showStatus("Completa todos los campos.", "status-error");
        return;
      }

      if (password !== confirmPassword) {
        showStatus("Las contrasenas no coinciden.", "status-error");
        return;
      }

      if (registerBtn.disabled) {
        return;
      }

      registerBtn.disabled = true;
      registerBtn.textContent = "Creando cuenta...";
      showStatus("Registrando usuario...", "status-info");

      try {
        const response = await fetch(`${API_BASE}/register`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ username, email, password }),
        });

        if (!response.ok) {
          throw new Error(await response.text());
        }

        const data = await response.json();
        localStorage.setItem("token", data.token);
        localStorage.setItem("userId", data.user._id);
        localStorage.setItem("username", data.user.username);

        showStatus("Cuenta creada. Entrando al feed...", "status-success");

        setTimeout(() => {
          window.location.href = "index.html";
        }, 700);
      } catch (error) {
        showStatus(error.message || "No se pudo crear la cuenta.", "status-error");
        registerBtn.disabled = false;
        registerBtn.textContent = "Crear cuenta";
      }
    }
  </script>
</body>
</html>
