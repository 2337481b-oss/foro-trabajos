<!DOCTYPE html>
<html>
<head>
  <title>Registro</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<script>
if (localStorage.getItem("userId")) {
  window.location.href = "index.html";
}
</script>

<div class="container fade-in">
  <h2>Crear cuenta</h2>

  <input id="username" placeholder="Usuario">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Contraseña">
  <input id="confirmPassword" type="password" placeholder="Confirmar contraseña">

  <!-- 👁️ Mostrar contraseña -->
  <label style="font-size:14px;">
    <input type="checkbox" onclick="togglePassword()"> Mostrar contraseña
  </label>

  <button id="registerBtn" onclick="register()">Registrarse</button>

  <p id="error" style="color:#ef4444; text-align:center;"></p>

  <p style="text-align:center;">
    ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
  </p>
</div>

<script>

// 👁️ MOSTRAR CONTRASEÑA
function togglePassword(){
  const pass = document.getElementById("password");
  const confirm = document.getElementById("confirmPassword");

  const type = pass.type === "password" ? "text" : "password";
  pass.type = type;
  confirm.type = type;
}

// 🚀 REGISTER
function register(){

  const username = document.getElementById("username").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const confirm = document.getElementById("confirmPassword").value;

  const error = document.getElementById("error");
  const btn = document.getElementById("registerBtn");

  error.innerText = "";

  // 🔒 VALIDACIONES PRO
  if (!username || !email || !password || !confirm) {
    error.innerText = "Completa todos los campos";
    return;
  }

  // username mínimo
  if (username.length < 3) {
    error.innerText = "El usuario debe tener al menos 3 caracteres";
    return;
  }

  // email válido
  const emailRegex = /\S+@\S+\.\S+/;
  if (!emailRegex.test(email)) {
    error.innerText = "Email inválido";
    return;
  }

  // contraseña fuerte
  if (password.length < 6) {
    error.innerText = "La contraseña debe tener mínimo 6 caracteres";
    return;
  }

  if (!/[A-Z]/.test(password) || !/[0-9]/.test(password)) {
    error.innerText = "La contraseña debe tener al menos 1 número y 1 mayúscula";
    return;
  }

  // confirmar contraseña
  if (password !== confirm) {
    error.innerText = "Las contraseñas no coinciden";
    return;
  }

  // 🚫 evitar doble click
  if (btn.disabled) return;

  // 🔄 UI
  btn.disabled = true;
  btn.innerText = "Registrando...";

  fetch("https://foro-trabajos.onrender.com/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ username, email, password })
  })
  .then(async res => {
    const text = await res.text();
    if (!res.ok) throw new Error(text);
    return text;
  })
  .then(data => {

    // 🔥 AUTO LOGIN (nivel pro real)
    localStorage.setItem("username", username);

    error.style.color = "#22c55e";
    error.innerText = "Cuenta creada correctamente";

    setTimeout(() => {
      window.location.href = "login.html";
    }, 1000);
  })
  .catch(err => {
    error.style.color = "#ef4444";
    error.innerText = err.message || "Error al registrar";

    btn.disabled = false;
    btn.innerText = "Registrarse";
  });
}

</script>

</body>
</html>
