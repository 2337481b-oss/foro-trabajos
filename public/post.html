<!DOCTYPE html>
<html>
<head>
  <title>Publicar</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="container fade-in">
  <h2>Nueva Publicación</h2>

  <input id="title" placeholder="Título">
  <input id="description" placeholder="Descripción">

  <!-- INPUT CORRECTO -->
  <input type="file" id="media" onchange="previewImage()">

  <!-- PREVIEW -->
  <img id="preview" style="display:none; margin-top:10px; width:100%; border-radius:10px;">

  <!-- BOTÓN PARA QUITAR -->
  <button id="removeBtn" onclick="removeImage()" style="display:none;">Quitar imagen</button>

  <button onclick="upload()">Publicar</button>
</div>

<script>

// 👁️ PREVIEW
function previewImage(){
  const mediaInput = document.getElementById("media");
  const file = mediaInput.files[0];

  if(!file) return;

  // 🔒 Validar tipo
  if(!file.type.startsWith("image/")){
    alert("Solo puedes subir imágenes");
    mediaInput.value = "";
    return;
  }

  // 🔒 Validar tamaño (5MB)
  if(file.size > 5 * 1024 * 1024){
    alert("La imagen es muy grande (máx 5MB)");
    mediaInput.value = "";
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e){
    const preview = document.getElementById("preview");
    const removeBtn = document.getElementById("removeBtn");

    preview.src = e.target.result;
    preview.style.display = "block";
    removeBtn.style.display = "block";
  }

  reader.readAsDataURL(file);
}

// ❌ QUITAR IMAGEN
function removeImage(){
  const mediaInput = document.getElementById("media");
  const preview = document.getElementById("preview");
  const removeBtn = document.getElementById("removeBtn");

  mediaInput.value = "";
  preview.src = "";
  preview.style.display = "none";
  removeBtn.style.display = "none";
}

// 🚀 SUBIR
function upload(){

  const titleInput = document.getElementById("title");
  const descInput = document.getElementById("description");
  const mediaInput = document.getElementById("media");

  if (!titleInput.value || !descInput.value) {
    alert("Completa todos los campos");
    return;
  }

  const formData = new FormData();

  formData.append("title", titleInput.value);
  formData.append("description", descInput.value);
  formData.append("userId", localStorage.getItem("userId"));

  if (mediaInput.files.length > 0) {
    formData.append("media", mediaInput.files[0]);
  }

  fetch("https://foro-trabajos.onrender.com/post", {
    method:"POST",
    body: formData
  })
  .then(res => res.text())
  .then(data => {
    alert(data);
    window.location.href = "index.html";
  })
  .catch(err => {
    console.log(err);
    alert("Error al subir");
  });
}

</script>

</body>
</html>
