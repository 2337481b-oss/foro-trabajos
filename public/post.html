<!DOCTYPE html>
<html>
<head>
  <title>Publicar</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- 🔒 PROTECCIÓN -->
<script>
if (!localStorage.getItem("userId")) {
  window.location.href = "login.html";
}
</script>

<!-- 🧭 NAVBAR -->
<div class="navbar">
  <h3>💼 Foro</h3>

  <div>
    <span id="userName"></span>
    <a href="index.html">Inicio</a>
    <button onclick="logout()">Cerrar sesión</button>
  </div>
</div>

<!-- 📄 CONTENIDO -->
<div class="container fade-in">
  <h2>Nueva Publicación</h2>

  <input id="title" placeholder="Título">
  <input id="description" placeholder="Descripción">

  <!-- INPUT -->
  <input type="file" id="media" accept="image/*" onchange="previewImage()">

  <!-- PREVIEW -->
  <img id="preview" style="display:none; margin-top:10px; width:100%; border-radius:10px;">

  <!-- BOTÓN PARA QUITAR -->
  <button id="removeBtn" onclick="removeImage()" style="display:none;">Quitar imagen</button>

  <!-- BOTÓN PUBLICAR -->
  <button id="publishBtn" onclick="upload()">Publicar</button>

  <!-- MENSAJE -->
  <p id="status" style="text-align:center;"></p>
</div>

<script>

// 👤 NOMBRE USUARIO
document.getElementById("userName").innerText = 
  "👤 " + (localStorage.getItem("username") || "Usuario");

// 🚪 LOGOUT
function logout(){
  localStorage.clear();
  window.location.href = "login.html";
}

// 👁️ PREVIEW
function previewImage(){
  const mediaInput = document.getElementById("media");
  const file = mediaInput.files[0];

  if(!file) return;

  // 🔒 VALIDACIONES
  if(!file.type.startsWith("image/")){
    alert("Solo puedes subir imágenes");
    mediaInput.value = "";
    return;
  }

  if(file.size > 5 * 1024 * 1024){
    alert("La imagen es muy grande (máx 5MB)");
    mediaInput.value = "";
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e){
    const preview = document.getElementById("preview");
    const removeBtn = document.getElementById("removeBtn");

    preview.src = e.target.result;
    preview.style.display = "block";
    removeBtn.style.display = "block";
  }

  reader.readAsDataURL(file);
}

// ❌ QUITAR IMAGEN
function removeImage(){
  const mediaInput = document.getElementById("media");
  const preview = document.getElementById("preview");
  const removeBtn = document.getElementById("removeBtn");

  mediaInput.value = "";
  preview.src = "";
  preview.style.display = "none";
  removeBtn.style.display = "none";
}

// 🚀 SUBIR
function upload(){

  const titleInput = document.getElementById("title");
  const descInput = document.getElementById("description");
  const mediaInput = document.getElementById("media");
  const status = document.getElementById("status");
  const btn = document.getElementById("publishBtn");

  // 🔒 VALIDACIÓN
  if (!titleInput.value.trim() || !descInput.value.trim()) {
    alert("Completa todos los campos");
    return;
  }

  // 🔄 UI DE CARGA
  btn.disabled = true;
  btn.innerText = "Publicando...";
  status.innerText = "⏳ Subiendo publicación...";

  const formData = new FormData();

  formData.append("title", titleInput.value.trim());
  formData.append("description", descInput.value.trim());
  formData.append("userId", localStorage.getItem("userId"));

  if (mediaInput.files.length > 0) {
    formData.append("media", mediaInput.files[0]);
  }

  fetch("https://foro-trabajos.onrender.com/post", {
    method:"POST",
    body: formData
  })
  .then(async res => {
    if (!res.ok) throw new Error("Error servidor");
    return res.text();
  })
  .then(data => {

    // 🔁 LIMPIAR FORM
    titleInput.value = "";
    descInput.value = "";
    removeImage();

    status.innerText = "✅ Publicado correctamente";

    setTimeout(() => {
      window.location.href = "index.html";
    }, 1200);
  })
  .catch(err => {
    console.log(err);
    status.innerText = "❌ Error al subir";

    btn.disabled = false;
    btn.innerText = "Publicar";
  });
}

</script>

</body>
</html>
