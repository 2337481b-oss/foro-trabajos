<!DOCTYPE html>
<html>
<head>
  <title>Publicar</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- 🔒 PROTECCIÓN -->
<script>
if (!localStorage.getItem("userId")) {
  window.location.href = "login.html";
}
</script>

<!-- 🧭 NAVBAR -->
<div class="navbar">
  <h3>💼 Foro</h3>

  <div>
    <span id="userName"></span>
    <a href="index.html">Inicio</a>
    <button onclick="logout()">Cerrar sesión</button>
  </div>
</div>

<!-- 📄 CONTENIDO -->
<div class="container fade-in">
  <h2>Nueva Publicación</h2>

  <input id="title" maxlength="100" placeholder="Título">
  <small id="titleCount">0/100</small>

  <textarea id="description" maxlength="500" placeholder="¿Qué quieres compartir?" style="width:100%; height:100px;"></textarea>
  <small id="descCount">0/500</small>

  <!-- INPUT -->
  <input type="file" id="media" accept="image/*" onchange="previewImage()">

  <!-- PREVIEW -->
  <img id="preview" style="display:none; margin-top:10px; width:100%; border-radius:10px;">

  <!-- BOTÓN PARA QUITAR -->
  <button id="removeBtn" onclick="removeImage()" style="display:none;">Quitar imagen</button>

  <!-- BOTÓN PUBLICAR -->
  <button id="publishBtn" onclick="upload()">Publicar</button>

  <!-- MENSAJE -->
  <p id="status" style="text-align:center;"></p>
</div>

<script>

// 👤 USERNAME
document.getElementById("userName").innerText =
  "👤 " + (localStorage.getItem("username") || "Usuario");

// 🚪 LOGOUT
function logout(){
  localStorage.clear();
  window.location.href = "login.html";
}

// 📊 CONTADOR TEXTO
const titleInput = document.getElementById("title");
const descInput = document.getElementById("description");

titleInput.addEventListener("input", () => {
  document.getElementById("titleCount").innerText =
    `${titleInput.value.length}/100`;
});

descInput.addEventListener("input", () => {
  document.getElementById("descCount").innerText =
    `${descInput.value.length}/500`;
});

// 👁️ PREVIEW
function previewImage(){
  const mediaInput = document.getElementById("media");
  const file = mediaInput.files[0];

  if(!file) return;

  // 🔒 VALIDAR TIPO
  if(!file.type.startsWith("image/")){
    alert("❌ Solo puedes subir imágenes");
    mediaInput.value = "";
    return;
  }

  // 🔒 VALIDAR TAMAÑO
  if(file.size > 5 * 1024 * 1024){
    alert("❌ Imagen muy grande (máx 5MB)");
    mediaInput.value = "";
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e){
    const preview = document.getElementById("preview");
    const removeBtn = document.getElementById("removeBtn");

    preview.src = e.target.result;
    preview.style.display = "block";
    removeBtn.style.display = "block";
  }

  reader.readAsDataURL(file);
}

// ❌ QUITAR IMAGEN
function removeImage(){
  const mediaInput = document.getElementById("media");
  const preview = document.getElementById("preview");
  const removeBtn = document.getElementById("removeBtn");

  mediaInput.value = "";
  preview.src = "";
  preview.style.display = "none";
  removeBtn.style.display = "none";
}

// 🚀 SUBIR
function upload(){

  const title = titleInput.value.trim();
  const desc = descInput.value.trim();
  const mediaInput = document.getElementById("media");
  const status = document.getElementById("status");
  const btn = document.getElementById("publishBtn");

  // 🔒 VALIDACIÓN PRO
  if (!title || !desc) {
    status.style.color = "#ef4444";
    status.innerText = "⚠️ Completa todos los campos";
    return;
  }

  if (btn.disabled) return;

  // 🔄 UI
  btn.disabled = true;
  btn.innerText = "Publicando...";
  status.style.color = "#38bdf8";
  status.innerText = "⏳ Subiendo publicación...";

  const formData = new FormData();
  formData.append("title", title);
  formData.append("description", desc);
  formData.append("userId", localStorage.getItem("userId"));

  if (mediaInput.files.length > 0) {
    formData.append("media", mediaInput.files[0]);
  }

  fetch("https://foro-trabajos.onrender.com/post", {
    method:"POST",
    body: formData
  })
  .then(async res => {
    const text = await res.text();
    if (!res.ok) throw new Error(text);
    return text;
  })
  .then(() => {

    // 🔁 LIMPIAR
    titleInput.value = "";
    descInput.value = "";
    removeImage();

    status.style.color = "#22c55e";
    status.innerText = "✅ Publicado correctamente";

    btn.innerText = "✔ Publicado";

    // 🔥 REDIRECCIÓN SUAVE
    setTimeout(() => {
      window.location.href = "index.html";
    }, 800);
  })
  .catch(err => {
    console.log(err);

    status.style.color = "#ef4444";
    status.innerText = err.message || "❌ Error al subir";

    btn.disabled = false;
    btn.innerText = "Publicar";
  });
}

// ⌨️ CTRL + ENTER PARA PUBLICAR
document.addEventListener("keydown", (e) => {
  if (e.ctrlKey && e.key === "Enter") {
    upload();
  }
});

</script>

</body>
</html>
