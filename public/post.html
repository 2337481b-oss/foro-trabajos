<!DOCTYPE html>
<html>
<head>
  <title>Publicar</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="container fade-in">
  <h2>Nueva Publicación</h2>

  <input id="title" placeholder="Título">
  <input id="description" placeholder="Descripción">
  <input type="file" id="media">
  <input type="file" id="media" onchange="previewImage()">

<img id="preview" style="width:100%; margin-top:10px; display:none;">

  <button onclick="upload()">Publicar</button>
</div>

<script>
  function previewImage(){
  const file = media.files[0];

  if(file){
    const reader = new FileReader();

    reader.onload = function(e){
      const preview = document.getElementById("preview");
      preview.src = e.target.result;
      preview.style.display = "block";
    }

    reader.readAsDataURL(file);
  }
}
function upload(){

  const titleInput = document.getElementById("title");
  const descInput = document.getElementById("description");
  const mediaInput = document.getElementById("media");

  const formData = new FormData();

  formData.append("title", titleInput.value);
  formData.append("description", descInput.value);
  formData.append("userId", localStorage.getItem("userId"));

  // 👇 CLAVE
  if (mediaInput.files.length > 0) {
    formData.append("media", mediaInput.files[0]);
  }

  fetch("https://foro-trabajos.onrender.com/post", {
    method:"POST",
    body: formData
  })
  .then(res => res.text())
  .then(data => {
    alert(data);
    window.location.href = "index.html";
  })
  .catch(err => {
    console.log(err);
    alert("Error al subir");
  });
}
</script>
