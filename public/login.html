<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<script>
// 🔒 Si ya está logueado → directo al feed
if (localStorage.getItem("userId")) {
  window.location.href = "index.html";
}
</script>

<div class="container fade-in">

  <h2 id="formTitle">Iniciar Sesión</h2>

  <!-- SOLO REGISTRO -->
  <input id="username" placeholder="Usuario" style="display:none;">

  <input id="email" placeholder="Email">

  <div style="position:relative;">
    <input id="password" type="password" placeholder="Contraseña">
    <span onclick="togglePassword()" style="
      position:absolute;
      right:10px;
      top:10px;
      cursor:pointer;
      color:#38bdf8;
    ">👁️</span>
  </div>

  <!-- RECORDAR SESIÓN -->
  <label style="font-size:14px;">
    <input type="checkbox" id="remember"> Recordarme
  </label>

  <button id="mainBtn" onclick="handleAction()">Entrar</button>

  <p id="error" style="color:#ef4444; text-align:center;"></p>

  <p id="toggleText" onclick="toggleForm()" style="cursor:pointer; color:#38bdf8; text-align:center;">
    ¿No tienes cuenta? Regístrate
  </p>

</div>

<script>

let isLogin = true;

// 👁️ PASSWORD
function togglePassword(){
  const pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}

// 🔁 CAMBIAR FORM
function toggleForm(){
  isLogin = !isLogin;

  document.getElementById("formTitle").innerText =
    isLogin ? "Iniciar Sesión" : "Crear cuenta";

  document.getElementById("username").style.display =
    isLogin ? "none" : "block";

  document.getElementById("mainBtn").innerText =
    isLogin ? "Entrar" : "Registrarse";

  document.getElementById("toggleText").innerText =
    isLogin
    ? "¿No tienes cuenta? Regístrate"
    : "¿Ya tienes cuenta? Inicia sesión";

  document.getElementById("error").innerText = "";
}

// 🚀 LOGIN / REGISTER
function handleAction(){

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const username = document.getElementById("username").value.trim();
  const remember = document.getElementById("remember").checked;

  const error = document.getElementById("error");
  const btn = document.getElementById("mainBtn");

  error.innerText = "";

  // 🔒 VALIDACIONES
  if (!email || !password || (!isLogin && !username)) {
    error.innerText = "Completa todos los campos";
    return;
  }

  const emailRegex = /\S+@\S+\.\S+/;
  if (!emailRegex.test(email)) {
    error.innerText = "Email inválido";
    return;
  }

  if (btn.disabled) return;

  // 🔄 UI
  btn.disabled = true;
  btn.innerText = isLogin ? "Entrando..." : "Registrando...";

  if (isLogin) {

    // 🔑 LOGIN
    fetch("https://foro-trabajos.onrender.com/login", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ email, password })
    })
    .then(async res => {
      const data = await res.json();

      if (!res.ok) throw new Error(data);

      return data;
    })
    .then(data => {

      // 💾 GUARDAR SESIÓN
      localStorage.setItem("userId", data.user._id);
      localStorage.setItem("username", data.user.username);
      localStorage.setItem("token", data.token);

      if (remember) {
        localStorage.setItem("remember", "true");
      }

      // 🎯 REDIRECCIÓN
      window.location.href = "index.html";
    })
    .catch(err => {
      error.innerText = err.message || "Error al iniciar sesión";
      btn.disabled = false;
      btn.innerText = "Entrar";
    });

  } else {

    // 🔐 REGISTER
    fetch("https://foro-trabajos.onrender.com/register", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ username, email, password })
    })
    .then(async res => {
      const text = await res.text();

      if (!res.ok) throw new Error(text);

      return text;
    })
    .then(() => {

      // 🔥 AUTO LOGIN (PRO)
      return fetch("https://foro-trabajos.onrender.com/login", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ email, password })
      });
    })
    .then(res => res.json())
    .then(data => {

      localStorage.setItem("userId", data.user._id);
      localStorage.setItem("username", data.user.username);
      localStorage.setItem("token", data.token);

      window.location.href = "index.html";
    })
    .catch(err => {
      error.innerText = err.message || "Error al registrar";
      btn.disabled = false;
      btn.innerText = "Registrarse";
    });
  }
}

</script>

</body>
</html>
