<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesion</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <script>
    if (localStorage.getItem("token") && localStorage.getItem("userId")) {
      window.location.href = "index.html";
    }
  </script>

  <main class="page-shell fade-in">
    <section class="card form-card">
      <div class="brand">
        <div class="brand-mark">FT</div>
        <div class="brand-copy">
          <h2>Bienvenido de nuevo</h2>
          <p>Entra para publicar, comentar y abrir mensajes directos desde el feed.</p>
        </div>
      </div>

      <div class="form-grid">
        <div class="field-group">
          <label class="field-label" for="email">Email</label>
          <input id="email" type="email" autocomplete="email" placeholder="tucorreo@ejemplo.com">
        </div>

        <div class="field-group">
          <div class="field-row">
            <label class="field-label" for="password">Contrasena</label>
            <button class="button-ghost" type="button" onclick="togglePassword()">Mostrar</button>
          </div>
          <input id="password" type="password" autocomplete="current-password" placeholder="Tu contrasena">
        </div>

        <label class="helper-text">
          <input type="checkbox" id="remember">
          Recordar sesion en este navegador
        </label>

        <button class="button-block" id="loginBtn" type="button" onclick="login()">Entrar</button>
        <p class="status-message" id="status" aria-live="polite"></p>

        <p class="helper-text">
          Aun no tienes cuenta?
          <a class="toggle-link" href="register.html">Creala aqui</a>
        </p>
      </div>
    </section>
  </main>

  <script>
    const API_BASE = window.location.origin;
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const status = document.getElementById("status");

    function showStatus(message, variant) {
      status.textContent = message;
      status.className = `status-message ${variant}`;
    }

    function togglePassword() {
      passwordInput.type = passwordInput.type === "password" ? "text" : "password";
    }

    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) {
        showStatus("Completa email y contrasena.", "status-error");
        return;
      }

      if (loginBtn.disabled) {
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "Entrando...";
      showStatus("Validando tus datos...", "status-info");

      try {
        const response = await fetch(`${API_BASE}/login`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ email, password }),
        });

        if (!response.ok) {
          throw new Error(await response.text());
        }

        const data = await response.json();
        localStorage.setItem("token", data.token);
        localStorage.setItem("userId", data.user._id);
        localStorage.setItem("username", data.user.username);

        if (document.getElementById("remember").checked) {
          localStorage.setItem("remember", "true");
        } else {
          localStorage.removeItem("remember");
        }

        window.location.href = "index.html";
      } catch (error) {
        showStatus(error.message || "No se pudo iniciar sesion.", "status-error");
        loginBtn.disabled = false;
        loginBtn.textContent = "Entrar";
      }
    }

    passwordInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        login();
      }
    });
  </script>
</body>
</html>
