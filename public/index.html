<!DOCTYPE html>
<html>
<head>
  <title>Foro de Trabajos</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- 🔒 PROTECCIÓN -->
<script>
if (!localStorage.getItem("userId")) {
  window.location.href = "login.html";
}
</script>

<!-- 🧭 NAVBAR -->
<div class="navbar">
  <h3>💼 Foro</h3>
  <div>
    <span id="userName"></span>
    <a href="post.html">Publicar</a>
    <button onclick="logout()">Cerrar sesión</button>
  </div>
</div>

<!-- 📄 CONTENIDO -->
<div class="container fade-in">
  <h2>Publicaciones</h2>
  <div id="posts"></div>
</div>

<script>

// 👤 USERNAME
document.getElementById("userName").innerText =
  "👤 " + (localStorage.getItem("username") || "Usuario");

// 🚪 LOGOUT
function logout(){
  localStorage.clear();
  window.location.href = "login.html";
}

// 📡 CARGAR POSTS
async function loadPosts(){
  try {
    const res = await fetch("https://foro-trabajos.onrender.com/posts");
    const data = await res.json();

    const container = document.getElementById("posts");
    container.innerHTML = "";

    data.forEach(post => {

      container.innerHTML += `
        <div class="card post" id="post-${post._id}">

          <div class="post-header">
            👤 Usuario
          </div>

          ${post.media ? `<img src="${post.media}" class="post-img">` : ""}

          <div class="post-body">
            <h3>${post.title}</h3>
            <p>${post.description}</p>
          </div>

          <div class="post-actions">

            <button onclick="likePost('${post._id}', this)">
              ❤️ <span id="likes-${post._id}">${post.likes || 0}</span>
            </button>

            <button onclick="toggleComments('${post._id}')">
              💬 <span id="count-${post._id}">0</span>
            </button>

            ${post.userId === localStorage.getItem("userId") ? `
              <button onclick="deletePost('${post._id}')">🗑</button>
            ` : ""}

          </div>

          <!-- 💬 COMENTARIOS -->
          <div class="comments" id="comments-${post._id}">
            <div id="list-${post._id}" class="loading">Cargando...</div>

            <div class="comment-input">
              <input id="input-${post._id}" placeholder="Escribe un comentario...">
              <button onclick="addComment('${post._id}')">Enviar</button>
            </div>
          </div>

        </div>
      `;

      loadCommentCount(post._id);
    });

  } catch (err) {
    console.log(err);
  }
}

// ❤️ LIKE CON ANIMACIÓN
function likePost(id, btn){

  fetch(`https://foro-trabajos.onrender.com/like/${id}`, {
    method:"POST"
  })
  .then(() => {

    const el = document.getElementById("likes-" + id);
    el.innerText = parseInt(el.innerText) + 1;

    // animación ❤️
    btn.classList.add("liked");

    setTimeout(() => {
      btn.classList.remove("liked");
    }, 300);
  });
}

// 🗑 ELIMINAR POST
function deletePost(id){

  if (!confirm("¿Eliminar publicación?")) return;

  fetch(`https://foro-trabajos.onrender.com/post/${id}`, {
    method:"DELETE",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      userId: localStorage.getItem("userId")
    })
  })
  .then(res => res.text())
  .then(msg => {
    alert(msg);
    document.getElementById("post-" + id).remove();
  });
}

// 💬 MOSTRAR/OCULTAR (tipo Facebook)
function toggleComments(postId){
  const box = document.getElementById("comments-" + postId);

  box.classList.toggle("active");

  if (box.classList.contains("active")) {
    loadComments(postId);
  }
}

// 💬 CARGAR COMENTARIOS
function loadComments(postId){
  fetch(`https://foro-trabajos.onrender.com/comments/${postId}`)
  .then(res => res.json())
  .then(data => {
    const list = document.getElementById("list-" + postId);
    list.innerHTML = "";

    if (data.length === 0) {
      list.innerHTML = `<p style="opacity:0.6;">Sin comentarios</p>`;
      return;
    }

    data.forEach(c => {
      list.innerHTML += `
        <div class="comment">
          <strong>${c.username}:</strong> ${c.content}
        </div>
      `;
    });
  });
}

// 💬 AGREGAR COMENTARIO
function addComment(postId){
  const input = document.getElementById("input-" + postId);
  const text = input.value;

  if (!text.trim()) return;

  fetch("https://foro-trabajos.onrender.com/comment", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      postId,
      username: localStorage.getItem("username"),
      content: text
    })
  })
  .then(() => {
    input.value = "";
    loadComments(postId);
    loadCommentCount(postId);
  });
}

// 🔢 CONTAR COMENTARIOS
function loadCommentCount(postId){
  fetch(`https://foro-trabajos.onrender.com/comments/${postId}`)
  .then(res => res.json())
  .then(data => {
    const el = document.getElementById("count-" + postId);
    el.innerText = data.length;
  });
}

// 🚀 INIT
loadPosts();

</script>

</body>
</html>
