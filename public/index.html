<!DOCTYPE html>
<html>
<head>
  <title>Foro de Trabajos</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<script>
if (!localStorage.getItem("userId")) {
  window.location.href = "login.html";
}
</script>

<div class="navbar">
  <h3>💼 Foro</h3>
  <div>
    <span id="userName"></span>
    <a href="post.html">Publicar</a>
    <button onclick="logout()">Cerrar sesión</button>
  </div>
</div>

<div class="container fade-in">
  <h2>Publicaciones</h2>
  <div id="posts"></div>
</div>

<script>

document.getElementById("userName").innerText =
  "👤 " + localStorage.getItem("username");

// 🚪 LOGOUT
function logout(){
  localStorage.clear();
  window.location.href = "login.html";
}

// 📡 POSTS
fetch("https://foro-trabajos.onrender.com/posts")
.then(res => res.json())
.then(data => {
  const container = document.getElementById("posts");

  data.reverse().forEach(post => {
    container.innerHTML += `
      <div class="card post">

        <div class="post-header">👤 Usuario</div>

        ${post.media ? `<img src="${post.media}" class="post-img">` : ""}

        <div class="post-body">
          <h3>${post.title}</h3>
          <p>${post.description}</p>
        </div>

        <div class="post-actions">
          <button onclick="likePost('${post._id}')">
            ❤️ <span id="likes-${post._id}">${post.likes || 0}</span>
          </button>
        </div>

        <!-- 💬 COMENTARIOS -->
        <div class="comments" id="comments-${post._id}">
          <div id="list-${post._id}"></div>

          <div class="comment-input">
            <input id="input-${post._id}" placeholder="Escribe un comentario...">
            <button onclick="addComment('${post._id}')">Enviar</button>
          </div>
        </div>

      </div>
    `;

    loadComments(post._id);
  });
});

// ❤️ LIKE
function likePost(id){
  fetch(`https://foro-trabajos.onrender.com/like/${id}`, {
    method:"POST"
  })
  .then(() => {
    const el = document.getElementById("likes-" + id);
    el.innerText = parseInt(el.innerText) + 1;
  });
}

// 💬 CARGAR COMENTARIOS
function loadComments(postId){
  fetch(`https://foro-trabajos.onrender.com/comments/${postId}`)
  .then(res => res.json())
  .then(data => {
    const list = document.getElementById("list-" + postId);
    list.innerHTML = "";

    data.forEach(c => {
      list.innerHTML += `
        <div class="comment">
          <strong>${c.username}:</strong> ${c.content}
        </div>
      `;
    });
  });
}

// 💬 AGREGAR COMENTARIO
function addComment(postId){

  const input = document.getElementById("input-" + postId);
  const text = input.value;

  if (!text) return;

  fetch("https://foro-trabajos.onrender.com/comment", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      postId: postId,
      username: localStorage.getItem("username"),
      content: text
    })
  })
  .then(() => {
    input.value = "";
    loadComments(postId); // recargar solo comentarios
  });
}

</script>

</body>
</html>
