<!DOCTYPE html>
<html>
<head>
  <title>Foro de Trabajos</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- 🔒 PROTECCIÓN -->
<script>
if (!localStorage.getItem("userId")) {
  window.location.href = "login.html";
}
</script>

<!-- 🧭 NAVBAR -->
<div class="navbar">
  <h3>💼 Foro</h3>

  <div>
    <span id="userName"></span>
    <a href="index.html">Inicio</a>
    <a href="post.html">Publicar</a>
    <button onclick="logout()">Cerrar sesión</button>
  </div>
</div>

<!-- 📄 CONTENIDO -->
<div class="container fade-in">
  <h2>Publicaciones</h2>
  <div id="posts"></div>
</div>

<script>

// 👤 MOSTRAR USUARIO
document.getElementById("userName").innerText = 
  "👤 " + (localStorage.getItem("username") || "Usuario");

// 🚪 LOGOUT
function logout(){
  localStorage.clear();
  window.location.href = "login.html";
}

// 📡 CARGAR POSTS
fetch("https://foro-trabajos.onrender.com/posts")
.then(res => res.json())
.then(data => {
  const container = document.getElementById("posts");
  container.innerHTML = "";

  data.reverse().forEach(post => {

    const postHTML = `
      <div class="card post">

        <div class="post-header">
          <strong>👤 Usuario</strong>
        </div>

        ${post.media ? `<img src="${post.media}" class="post-img">` : ""}

        <div class="post-body">
          <h3>${post.title}</h3>
          <p>${post.description}</p>
        </div>

        <div class="post-actions">
          <button onclick="likePost('${post._id}')">
            ❤️ <span id="likes-${post._id}">${post.likes || 0}</span>
          </button>
        </div>

      </div>
    `;

    container.innerHTML += postHTML;
  });
});

// ❤️ LIKE SIN RECARGAR
function likePost(id){
  fetch(`https://foro-trabajos.onrender.com/like/${id}`, {
    method:"POST"
  })
  .then(() => {
    const likeSpan = document.getElementById("likes-" + id);
    likeSpan.innerText = parseInt(likeSpan.innerText) + 1;
  })
  .catch(() => {
    alert("Error al dar like");
  });
}

</script>

</body>
</html>
