<!DOCTYPE html>
<html>
<head>
  <title>Foro de Trabajos</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- 🔒 PROTECCIÓN -->
<script>
if (!localStorage.getItem("userId")) {
  window.location.href = "login.html";
}
</script>

<!-- 🧭 NAVBAR -->
<div class="navbar">
  <h3>💼 Foro</h3>
  <div>
    <span id="userName"></span>
    <a href="post.html">Publicar</a>
    <button onclick="logout()">Cerrar sesión</button>
  </div>
</div>

<!-- 📄 CONTENIDO -->
<div class="container fade-in">
  <h2>Publicaciones</h2>
  <div id="posts"></div>
</div>

<script>

// 👤 USERNAME
document.getElementById("userName").innerText =
  "👤 " + (localStorage.getItem("username") || "Usuario");

// 🚪 LOGOUT
function logout(){
  localStorage.clear();
  window.location.href = "login.html";
}

// 📡 CARGAR POSTS
async function loadPosts(){
  try {
    const res = await fetch("https://foro-trabajos.onrender.com/posts");
    const data = await res.json();

    const container = document.getElementById("posts");
    container.innerHTML = "";

    data.reverse().forEach(post => {

      container.innerHTML += `
        <div class="card post">

          <div class="post-header">
            👤 Usuario
          </div>

          ${post.media ? `<img src="${post.media}" class="post-img">` : ""}

          <div class="post-body">
            <h3>${post.title}</h3>
            <p>${post.description}</p>
          </div>

          <div class="post-actions">

            <button onclick="likePost('${post._id}')">
              ❤️ <span id="likes-${post._id}">${post.likes || 0}</span>
            </button>

            <button onclick="goToComments('${post._id}')">
              💬 <span id="count-${post._id}">...</span>
            </button>

          </div>

        </div>
      `;

      // cargar número de comentarios
      loadCommentCount(post._id);
    });

  } catch (err) {
    console.log(err);
  }
}

// ❤️ LIKE SIN RECARGAR
function likePost(id){
  fetch(`https://foro-trabajos.onrender.com/like/${id}`, {
    method:"POST"
  })
  .then(() => {
    const el = document.getElementById("likes-" + id);
    el.innerText = parseInt(el.innerText) + 1;
  });
}

// 💬 IR A COMENTARIOS
function goToComments(postId){
  window.location.href = `comments.html?postId=${postId}`;
}

// 🔢 CONTAR COMENTARIOS
function loadCommentCount(postId){
  fetch(`https://foro-trabajos.onrender.com/comments/${postId}`)
  .then(res => res.json())
  .then(data => {
    const el = document.getElementById("count-" + postId);
    el.innerText = data.length;
  });
}

// 🚀 INICIAR
loadPosts();

</script>

</body>
</html>
