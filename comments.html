<!DOCTYPE html>
<html>
<head>
  <title>Comentarios</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- 🔒 PROTECCIÓN -->
<script>
if (!localStorage.getItem("userId")) {
  window.location.href = "login.html";
}
</script>

<!-- 🧭 NAVBAR -->
<div class="navbar">
  <h3>💬 Comentarios</h3>

  <div>
    <span id="userName"></span>
    <a href="index.html">⬅ Volver</a>
    <button onclick="logout()">Cerrar sesión</button>
  </div>
</div>

<div class="container fade-in">

  <!-- POST -->
  <div id="post"></div>

  <!-- COMENTARIOS -->
  <h3>Comentarios</h3>
  <div id="comments"></div>

  <!-- INPUT -->
  <div class="comment-input">
    <input id="input" placeholder="Escribe un comentario...">
    <button onclick="addComment()">Enviar</button>
  </div>

</div>

<script>

// 👤 USER
document.getElementById("userName").innerText =
  "👤 " + (localStorage.getItem("username") || "Usuario");

// 📌 POST ID
const params = new URLSearchParams(window.location.search);
const postId = params.get("postId");

// 🚪 LOGOUT
function logout(){
  localStorage.clear();
  window.location.href = "login.html";
}

// 📄 CARGAR POST
async function loadPost(){
  try {
    const res = await fetch("https://foro-trabajos.onrender.com/posts");
    const data = await res.json();

    const post = data.find(p => p._id === postId);

    if (!post) {
      document.getElementById("post").innerHTML = "Post no encontrado";
      return;
    }

    document.getElementById("post").innerHTML = `
      <div class="card post">

        <div class="post-header">👤 Usuario</div>

        ${post.media ? `<img src="${post.media}" class="post-img">` : ""}

        <div class="post-body">
          <h3>${post.title}</h3>
          <p>${post.description}</p>
        </div>

        <div class="post-actions">
          <span>❤️ ${post.likes || 0}</span>
        </div>

      </div>
    `;

  } catch (err) {
    console.log(err);
  }
}

// 💬 CARGAR COMENTARIOS
async function loadComments(){
  try {
    const res = await fetch(`https://foro-trabajos.onrender.com/comments/${postId}`);
    const data = await res.json();

    const container = document.getElementById("comments");
    container.innerHTML = "";

    if (data.length === 0) {
      container.innerHTML = "<p>Sin comentarios</p>";
      return;
    }

    data.forEach(c => {
      container.innerHTML += `
        <div class="comment">
          <strong>${c.username}:</strong> ${c.content}
        </div>
      `;
    });

  } catch (err) {
    console.log(err);
  }
}

// 💬 AGREGAR COMENTARIO
async function addComment(){

  const input = document.getElementById("input");
  const text = input.value;

  if (!text) {
    alert("Escribe algo");
    return;
  }

  try {
    await fetch("https://foro-trabajos.onrender.com/comment", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        postId: postId,
        username: localStorage.getItem("username"),
        content: text
      })
    });

    input.value = "";
    loadComments();

  } catch (err) {
    console.log(err);
    alert("Error al comentar");
  }
}

// 🚀 INIT
loadPost();
loadComments();

</script>

</body>
</html>
